services:
  postgres:
    image: postgres:18.4-bookworm
    container_name: plantcare-postgres
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql
    restart: always

  port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: plantcare-postgres-port-forwarder
    command: -d -d TCP-LISTEN:5432,fork,reuseaddr TCP-CONNECT:postgres:5432
    ports:
      - "127.0.0.1:5432:5432"

  migrate:
    image: migrate/migrate:v4.18.1
    container_name: plantcare-migrate
    restart: on-failure
    env_file:
      - .env
    depends_on:
      - postgres
    volumes:
      - ./migrations:/migrations
    command: [ "-path", "/migrations", "-database", "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable", "up" ]

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: plantcare-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api

  api:
    build: .
    container_name: plantcare-api
    restart: always
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DB_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      LOGGER_FOLDER: ./logs
    volumes:
      - ./logs:/logs

volumes:
  pgdata:
